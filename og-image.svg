<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="30%" cy="25%" r="100%">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="55%" stop-color="#0f2a7a"/>
      <stop offset="100%" stop-color="#0a1a4d"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f85149"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- mancha decorativa -->
  <g opacity="0.08" fill="#ffffff">
    <circle cx="120" cy="540" r="9"/>
    <circle cx="160" cy="525" r="5"/>
    <circle cx="205" cy="545" r="7"/>
    <circle cx="1020" cy="100" r="6"/>
    <circle cx="1075" cy="80" r="9"/>
    <circle cx="1115" cy="130" r="5"/>
  </g>

  <!-- Bloque logo 45 -->
  <g transform="translate(80,140)">
    <rect width="340" height="340" rx="28" fill="#0f2a7a" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2"/>
    <text x="170" y="248" text-anchor="middle"
          font-family="'Arial Black','Segoe UI Black',Arial,sans-serif"
          font-size="245" font-weight="900" fill="#ffffff" letter-spacing="-5">45</text>
    <rect x="195" y="68" width="120" height="38" rx="19" fill="#dc2626" stroke="#ffffff" stroke-width="2"/>
    <text x="255" y="93" text-anchor="middle"
          font-family="'Segoe UI',Arial,sans-serif"
          font-size="20" font-weight="800" fill="#ffffff" letter-spacing="1.6">DIGITAL</text>
    <rect x="20" y="232" width="150" height="38" rx="19" fill="#facc15" stroke="#1e40af" stroke-width="2"/>
    <text x="95" y="257" text-anchor="middle"
          font-family="'Segoe UI',Arial,sans-serif"
          font-size="20" font-weight="800" fill="#1e3a8a" letter-spacing="1.3">NOTICIAS</text>
  </g>

  <!-- Texto editorial -->
  <g transform="translate(470,165)">
    <text x="0" y="0"
          font-family="'Inter','Segoe UI',Arial,sans-serif"
          font-size="22" font-weight="700" fill="#fbbf24" letter-spacing="3">INVESTIGACIÓN · 45 DIGITAL NOTICIAS</text>

    <text x="0" y="78"
          font-family="'Fraunces','Times New Roman',serif"
          font-size="72" font-weight="800" fill="#ffffff">Morelos:</text>
    <text x="0" y="158"
          font-family="'Fraunces','Times New Roman',serif"
          font-size="72" font-weight="800" fill="#ffffff">Seguridad municipal</text>

    <line x1="0" y1="190" x2="180" y2="190" stroke="url(#accent)" stroke-width="4"/>

    <text x="0" y="238"
          font-family="'Inter','Segoe UI',Arial,sans-serif"
          font-size="26" font-weight="500" fill="#c9d1d9">Hub de investigación · 36 municipios</text>
    <text x="0" y="276"
          font-family="'Inter','Segoe UI',Arial,sans-serif"
          font-size="26" font-weight="500" fill="#c9d1d9">SESNSP · RNPDNO · ENSU</text>

    <text x="0" y="358"
          font-family="'JetBrains Mono','Consolas',monospace"
          font-size="20" font-weight="600" fill="#fbbf24">v2.7 · corte mar-2026</text>
  </g>
